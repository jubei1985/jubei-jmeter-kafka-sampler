plugins {
    id 'groovy'
    id 'java-library'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

sourceCompatibility = 1.8
targetCompatibility = 1.8

repositories {
    mavenCentral()
}
java {
  //  toolchain {
  //      languageVersion = JavaLanguageVersion.of(11)
   // }
}
/*
ext{
    gitpath = System.getenv("GIT") ?: git
}
*/

version = "1.0.0-SNAPSHOT"
if (System.getenv("GITHUB_REF_TYPE") == "tag") {
    version = System.getenv("GITHUB_REF_NAME").replaceAll(/^v/, "")
}
	
dependencies {
    implementation 'org.apache.jmeter:ApacheJMeter_core:5.6.2'
    implementation 'org.apache.jmeter:ApacheJMeter_java:5.6.2'
    implementation 'org.apache.jmeter:ApacheJMeter_components:5.6.2'
    implementation 'org.apache.kafka:kafka-clients:3.6.1'
    implementation 'org.codehaus.groovy:groovy-all:3.0.12'
//    implementation fileTree(dir: "lib", include: '*.jar')
}

shadowJar {
    archiveClassifier = 'plugin'
    mergeServiceFiles()
    manifest {
        attributes 'Main-Class': 'ru.jmeter.sampler.KafkaProducerSampler'
    }
}
