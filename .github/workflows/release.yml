name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*' # Срабатывает на v1.0.1, v2.0.0 и т.д.

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Gradle сам увидит переменную GITHUB_REF_NAME и вставит её в имя JAR
      - name: Build Thin JAR
        run: ./gradlew jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true # GitHub сам напишет список коммитов, которые вошли в эту версию!
          files: build/libs/*-plugin.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
